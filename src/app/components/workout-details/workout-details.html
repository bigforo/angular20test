@if (session().activities?.length ?? 0 > 0){
  <!--  Session DATE TIME-->
  @for (activity of session().activities; track $index) {
    @let exercise = Activity.exerciseById(activity.id);
    <ion-list inset="true">
      <!--     Exercise NAME-->
      <ion-label>
        <h1 class="ion-text-capitalize">{{exercise?.name}}</h1>
      </ion-label>
      <!--     SETS -->
      <app-show-sets style="width: 100%" [activity]="activity" />
      <!--     Activity Note-->
      <ion-item>
        @if (activity.note?.length ?? 0 > 0) {
          <ion-label><p>{{ activity.note }} </p></ion-label>
        }
      </ion-item>

    </ion-list>
  }
  <!--  Workout/Session Note-->
  @if (session().note){
    <div>
      <h2 class="ion-padding-top ion-padding-start">Note</h2>
      <p class="ion-padding-start ion-padding-end">
        {{session().note}}
      </p>
    </div>
  }
}
