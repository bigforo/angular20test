<ion-header [translucent]="true">
    <ion-toolbar>

    <ion-buttons slot="start">
      <ion-button [routerLink]="['/app/tabs/sessions']">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title>Old Session Details</ion-title>

    <ion-buttons slot="end">
      <ion-button [routerLink]="['/view']" [queryParams]="{id: generatedLink()}">
        <ion-icon slot="icon-only" name="share"></ion-icon>
      </ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true">


  @if (session()){
        <app-workout-details [session]="session()"/>
    } @else {
      no history data
    }
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button (click)="copy()" >Copy </ion-button>
    </ion-buttons>
  <ion-title>Session Actions</ion-title>
    <ion-buttons slot="start">
      <ion-button [routerLink]="['/session-edit']" [queryParams]="{id: id()}" >Edit</ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-footer>
